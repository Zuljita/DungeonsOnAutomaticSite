name: Mirror App Release Downloads

on:
  repository_dispatch:
    types: [app_release_published]
  schedule:
    - cron: "*/15 * * * *"

permissions:
  actions: write
  contents: write
  issues: write

concurrency:
  group: mirror-app-release
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    env:
      SOURCE_REPO: Zuljita/DungeonsOnAutomatic
      TARGET_REPO: Zuljita/DungeonsOnAutomaticSite
      SOURCE_TAG: continuous
      TARGET_TAG: continuous
      SOURCE_TOKEN: ${{ secrets.DOA_RELEASE_MIRROR_TOKEN }}
      TARGET_TOKEN: ${{ github.token }}
      ALERT_TITLE: Release mirror token needs attention
    steps:
      - name: Checkout public site
        uses: actions/checkout@v4

      - name: Resolve mirror tags
        env:
          DISPATCH_SOURCE_TAG: ${{ github.event.client_payload.source_tag }}
          DISPATCH_TARGET_TAG: ${{ github.event.client_payload.target_tag }}
        run: |
          source_tag="${DISPATCH_SOURCE_TAG:-continuous}"
          target_tag="${DISPATCH_TARGET_TAG:-continuous}"
          echo "SOURCE_TAG=$source_tag" >> "$GITHUB_ENV"
          echo "TARGET_TAG=$target_tag" >> "$GITHUB_ENV"

      - name: Preflight source release access
        run: |
          mkdir -p data mirror-meta
          alert_issue() {
            echo "::warning title=Release mirror unavailable::$1"
            run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            body="The release mirror could not read ${SOURCE_REPO}@${SOURCE_TAG}.

Reason: $1

Run: ${run_url}

Refresh or replace the DOA_RELEASE_MIRROR_TOKEN secret, then rerun this workflow."
            existing="$(GH_TOKEN="$TARGET_TOKEN" gh issue list \
              --repo "$TARGET_REPO" \
              --state open \
              --search "$ALERT_TITLE in:title" \
              --json number \
              --jq '.[0].number // empty')"
            if [ -n "$existing" ]; then
              GH_TOKEN="$TARGET_TOKEN" gh issue edit "$existing" \
                --repo "$TARGET_REPO" \
                --body "$body"
            else
              GH_TOKEN="$TARGET_TOKEN" gh issue create \
                --repo "$TARGET_REPO" \
                --title "$ALERT_TITLE" \
                --body "$body"
            fi
          }

          if [ -z "$SOURCE_TOKEN" ]; then
            message="DOA_RELEASE_MIRROR_TOKEN is not set."
            if [ "${GITHUB_EVENT_NAME}" = "schedule" ]; then
              alert_issue "$message"
              echo "MIRROR_SKIP=1" >> "$GITHUB_ENV"
              exit 0
            fi
            echo "::error title=Missing release mirror token::$message"
            exit 1
          fi

          if GH_TOKEN="$SOURCE_TOKEN" gh api "repos/$SOURCE_REPO/releases/tags/$SOURCE_TAG" \
            > mirror-meta/source-release.json; then
            echo "Using DOA_RELEASE_MIRROR_TOKEN to read $SOURCE_REPO."
            exit 0
          fi

          message="DOA_RELEASE_MIRROR_TOKEN could not read ${SOURCE_REPO}@${SOURCE_TAG}."
          if [ "${GITHUB_EVENT_NAME}" = "schedule" ]; then
            alert_issue "$message"
            echo "MIRROR_SKIP=1" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "::error title=Invalid release mirror token::$message"
          exit 1

      - name: Read source metadata
        run: |
          [ "$MIRROR_SKIP" = "1" ] && exit 0
          jq -r '.body // ""' mirror-meta/source-release.json > release-notes.md
          {
            echo ""
            echo "---"
            echo "Mirrored from $SOURCE_REPO release $SOURCE_TAG."
          } >> release-notes.md
          jq -r '.name // "Continuous build"' mirror-meta/source-release.json \
            > release-title.txt
          jq '[.assets[] | {name, size, digest}] | sort_by(.name)' \
            mirror-meta/source-release.json > mirror-meta/source-assets.json

      - name: Write public changelog data
        run: |
          [ "$MIRROR_SKIP" = "1" ] && exit 0
          mkdir -p data
          GH_TOKEN="$SOURCE_TOKEN" gh api "repos/$SOURCE_REPO/releases" \
            --paginate \
            --jq '[.[] | select(.draft == false) | {tagName: .tag_name, name: .name, publishedAt: .published_at, isPrerelease: .prerelease, body: (.body // "")}]' \
            > data/releases.json

      - name: Compare mirrored assets
        run: |
          [ "$MIRROR_SKIP" = "1" ] && exit 0
          if GH_TOKEN="$TARGET_TOKEN" gh api "repos/$TARGET_REPO/releases/tags/$TARGET_TAG" \
            > mirror-meta/target-release.json 2>/dev/null; then
            jq '[.assets[] | {name, size, digest}] | sort_by(.name)' \
              mirror-meta/target-release.json > mirror-meta/target-assets.json
            rm -rf mirror-meta/source-updater mirror-meta/target-updater
            mkdir -p mirror-meta/source-updater mirror-meta/target-updater
            GH_TOKEN="$SOURCE_TOKEN" gh release download "$SOURCE_TAG" \
              --repo "$SOURCE_REPO" \
              --pattern "latest*.yml" \
              --dir mirror-meta/source-updater \
              --clobber >/dev/null 2>&1 || true
            GH_TOKEN="$TARGET_TOKEN" gh release download "$TARGET_TAG" \
              --repo "$TARGET_REPO" \
              --pattern "latest*.yml" \
              --dir mirror-meta/target-updater \
              --clobber >/dev/null 2>&1 || true
            (
              cd mirror-meta/source-updater
              find . -type f -print | sort | while IFS= read -r file; do sha256sum "$file"; done
            ) > mirror-meta/source-updater.sha256
            (
              cd mirror-meta/target-updater
              find . -type f -print | sort | while IFS= read -r file; do sha256sum "$file"; done
            ) > mirror-meta/target-updater.sha256
            if cmp -s mirror-meta/source-assets.json mirror-meta/target-assets.json && \
              cmp -s mirror-meta/source-updater.sha256 mirror-meta/target-updater.sha256; then
              echo "Mirrored release assets are already current. Skipping asset download/upload."
              echo "MIRROR_ASSETS_CHANGED=0" >> "$GITHUB_ENV"
            else
              echo "Mirrored release assets or updater metadata differ from source. Asset mirror is required."
              echo "MIRROR_ASSETS_CHANGED=1" >> "$GITHUB_ENV"
            fi
          else
            echo "Target release does not exist. Asset mirror is required."
            echo "MIRROR_ASSETS_CHANGED=1" >> "$GITHUB_ENV"
          fi

      - name: Create or update public release
        run: |
          [ "$MIRROR_SKIP" = "1" ] && exit 0
          title="$(cat release-title.txt)"
          if GH_TOKEN="$TARGET_TOKEN" gh release view "$TARGET_TAG" --repo "$TARGET_REPO" >/dev/null 2>&1; then
            GH_TOKEN="$TARGET_TOKEN" gh release edit "$TARGET_TAG" \
              --repo "$TARGET_REPO" \
              --title "$title" \
              --notes-file release-notes.md
          else
            GH_TOKEN="$TARGET_TOKEN" gh release create "$TARGET_TAG" \
              --repo "$TARGET_REPO" \
              --target main \
              --title "$title" \
              --notes-file release-notes.md
          fi

      - name: Download source assets
        run: |
          [ "$MIRROR_SKIP" = "1" ] && exit 0
          [ "$MIRROR_ASSETS_CHANGED" != "1" ] && exit 0
          mkdir -p mirror-assets
          GH_TOKEN="$SOURCE_TOKEN" gh release download "$SOURCE_TAG" \
            --repo "$SOURCE_REPO" \
            --dir mirror-assets \
            --clobber

      - name: Replace mirrored assets
        run: |
          [ "$MIRROR_SKIP" = "1" ] && exit 0
          [ "$MIRROR_ASSETS_CHANGED" != "1" ] && exit 0
          GH_TOKEN="$TARGET_TOKEN" gh release view "$TARGET_TAG" \
            --repo "$TARGET_REPO" \
            --json assets \
            --jq '.assets[].name' > existing-assets.txt
          while IFS= read -r asset; do
            [ -z "$asset" ] && continue
            GH_TOKEN="$TARGET_TOKEN" gh release delete-asset "$TARGET_TAG" "$asset" \
              --repo "$TARGET_REPO" \
              --yes
          done < existing-assets.txt
          GH_TOKEN="$TARGET_TOKEN" gh release upload "$TARGET_TAG" mirror-assets/* \
            --repo "$TARGET_REPO" \
            --clobber

      - name: Commit public changelog data
        run: |
          [ "$MIRROR_SKIP" = "1" ] && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/releases.json
          if git diff --cached --quiet; then
            echo "No changelog changes to commit."
          else
            git commit -m "Update public changelog"
            git push
            GH_TOKEN="$TARGET_TOKEN" gh workflow run pages.yml --repo "$TARGET_REPO"
          fi
