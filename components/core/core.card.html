<style>
  body { margin: 0; background: var(--surface-app); padding: 22px; font-family: var(--font-body); }
  .doa-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 16px; }
  .doa-lbl { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-faint); margin: 0 0 8px; }

<body>
<div id="root"></div>
<script type="text/babel">
const { Button, IconButton, Badge, Tag, StatPill } = window.DungeonsOnAutomaticDesignSystem_e301a1;
const Ic = ({ n }) => <i data-lucide={n}></i>;

function Demo() {
  return (
    <div>
      <p className="doa-lbl">Buttons</p>
      <div className="doa-row">
        <Button variant="primary" leadingIcon={<Ic n="dices" />}>Generate Map</Button>
        <Button variant="secondary">Export JSON</Button>
        <Button variant="accent">Polish</Button>
        <Button variant="outline" size="sm">Reroll Encounters</Button>
        <Button variant="ghost" active>Show Biomes</Button>
        <Button variant="primary" disabled>Disabled</Button>
        <IconButton aria-label="Zoom in"><Ic n="plus" /></IconButton>
        <IconButton aria-label="Zoom out"><Ic n="minus" /></IconButton>
        <IconButton variant="ghost" aria-label="Settings"><Ic n="settings-2" /></IconButton>
      </div>
      <p className="doa-lbl">Badges — map-key semantics</p>
      <div className="doa-row">
        <Badge tone="encounter" dot>Encounter</Badge>
        <Badge tone="treasure" dot>Treasure</Badge>
        <Badge tone="hazard" dot>Trap</Badge>
        <Badge tone="key" dot>Quest key</Badge>
        <Badge tone="door" dot>Door</Badge>
        <Badge tone="secret" dot>Secret</Badge>
        <Badge tone="ok">Validated</Badge>
        <Badge tone="warn">Pacing</Badge>
        <Badge tone="danger">Contradiction</Badge>
        <Badge tone="key" solid>Key 3</Badge>
      </div>
      <p className="doa-lbl">Generation tags</p>
      <div className="doa-row">
        <Tag>military</Tag><Tag>organized</Tag><Tag>sapient</Tag>
        <Tag bias>ancient:3</Tag><Tag bias>guarded:2</Tag>
        <Tag onRemove={() => {}}>wet</Tag>
      </div>
      <p className="doa-lbl">Stat read-outs</p>
      <div className="doa-row">
        <StatPill label="Seed" value="8F1A-7C2D" />
        <StatPill label="Rooms" value="42" />
        <StatPill label="Party CER" value="125" />
        <StatPill label="Peril" value="6 / 10" plain />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
</script>
