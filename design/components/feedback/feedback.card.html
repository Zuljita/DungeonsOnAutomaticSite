<!-- @dsCard group="Components" viewport="700x360" name="Feedback — Director Toasts & Legend" subtitle="The Stage Manager cast in character, plus the map Key legend rows." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--surface-app); padding: 22px; font-family: var(--font-body); }
  .wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; align-items: start; }
  .legend { display: grid; gap: 9px; align-content: start; padding: 14px; background: var(--surface-panel); border: 1px solid var(--border-hairline); border-radius: var(--radius-md); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { DirectorToast, LegendItem } = window.DungeonsOnAutomaticDesignSystem_e301a1;
const P = "../../assets/portraits/";

function Demo() {
  return (
    <div className="wrap">
      <div style={{ display: 'grid', gap: '12px' }}>
        <DirectorToast portrait={P+"Vorga.png"} name="VORGA" role="Encounter Director">
          Three ogres in the pantry. I stand by it.
        </DirectorToast>
        <DirectorToast portrait={P+"Kovath.png"} name="KOVATH" role="Creative Director" tone="ember">
          Seed rejected. Another fine layout, doomed before it began.
        </DirectorToast>
        <DirectorToast portrait={P+"Mizzik.png"} name="MIZZIK" role="Furniture &amp; Loot">
          I weighed the hoard. It is, regrettably, fair.
        </DirectorToast>
      </div>
      <div className="legend">
        <LegendItem color="var(--key-encounter)" shape="dot" label="Monster encounter" />
        <LegendItem color="var(--key-treasure)" shape="diamond" label="Treasure" />
        <LegendItem color="var(--key-hazard-bg)" label="Trap / hazard" />
        <LegendItem color="var(--key-key)" shape="dot" label="Quest key" />
        <LegendItem color="var(--key-door)" label="Door" />
        <LegendItem color="var(--doc-floor)" label="Floor" />
        <LegendItem color="var(--doc-wall)" label="Hatched wall / rock" />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
