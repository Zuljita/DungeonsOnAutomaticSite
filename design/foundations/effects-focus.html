<!-- @dsCard group="Effects" viewport="700x170" name="Focus & Glow" subtitle="Brass focus ring on every interactive element. Ember/brass glows mark active state." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-app); padding: 26px 24px; font-family: var(--font-body); }
  .row { display: flex; gap: 22px; align-items: center; }
  .btn { height: 40px; padding: 0 18px; border-radius: var(--radius-sm); border: 1px solid var(--border-strong); background: var(--stone-700); color: var(--text-strong); font-size: 13px; display: flex; align-items: center; }
  .focus { box-shadow: var(--focus-ring); border-color: var(--brass-300); }
  .ember { background: var(--ember-500); border-color: var(--ember-600); color: #fff7e8; box-shadow: var(--glow-ember); }
  .brass { background: var(--stone-800); border-color: var(--brass-500); color: var(--brass-300); box-shadow: var(--glow-brass); }
  .lbl { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-faint); margin-top: 8px; text-align: center; }
  .cell { display: flex; flex-direction: column; }
</style>
</head>
<body>
  <div class="row">
    <div class="cell"><div class="btn focus">Focused</div><div class="lbl">--focus-ring</div></div>
    <div class="cell"><div class="btn ember">Generate</div><div class="lbl">--glow-ember</div></div>
    <div class="cell"><div class="btn brass">Active layer</div><div class="lbl">--glow-brass</div></div>
  </div>
</body>
</html>
