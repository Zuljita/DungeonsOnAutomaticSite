<!-- @dsCard group="Type" viewport="700x200" name="Display — Cinzel" subtitle="Carved-stone capitals. Wordmark, section heads, big numbers. Always with tracking." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-panel); padding: 22px 24px; color: var(--text-strong); }
  .big { font-family: var(--font-display); font-weight: 800; font-size: 44px; letter-spacing: var(--tracking-display); line-height: 1.05; }
  .mid { font-family: var(--font-display); font-weight: 600; font-size: 24px; letter-spacing: var(--tracking-display); margin-top: 8px; color: var(--brass-300); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); margin-top: 14px; letter-spacing: 0.02em; }
</style>
</head>
<body>
  <div class="big">DUNGEONS ON AUTOMATIC</div>
  <div class="mid">Room. Corridor. Trap. Repeat.</div>
  <div class="meta">Cinzel · 600 / 800 · tracking 0.06em · UPPERCASE</div>
</body>
</html>
