<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dungeons on Automatic — Generator</title>
<link rel="icon" href="../../assets/brand/favicon.ico">
<link rel="stylesheet" href="../../styles.css">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="../../_ds_bundle.js"></script>

</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Icon.jsx"></script>
<script type="text/babel" src="MapCanvas.jsx"></script>
<script type="text/babel" src="AppBar.jsx"></script>
<script type="text/babel" src="ControlRail.jsx"></script>
<script type="text/babel" src="InfoPanels.jsx"></script>
<script type="text/babel" src="StageManager.jsx"></script>
<script type="text/babel" src="App.jsx"></script>
<script type="text/babel" data-presets="react">
  const mount = () => {
    if (!window.App) { setTimeout(mount, 40); return; }
    const App = window.App;
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  };
  mount();
</script>
</body>
