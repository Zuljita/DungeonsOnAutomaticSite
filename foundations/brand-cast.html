<!-- @dsCard group="Brand" viewport="700x280" name="The Stage Manager" subtitle="The four narrative directors who narrate generation. Portraits are signature brand assets." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-panel); padding: 20px; font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .card { background: var(--surface-sunken); border: 1px solid var(--border-hairline); border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .card img { width: 100%; height: 130px; object-fit: cover; object-position: center top; display: block; filter: saturate(0.95); }
  .meta { padding: 9px 11px; }
  .name { font-family: var(--font-display); font-weight: 700; font-size: 15px; letter-spacing: 0.04em; color: var(--brass-300); }
  .role { font-size: 11.5px; color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="card"><img src="../assets/portraits/Kovath.png" alt="Kovath"><div class="meta"><div class="name">KOVATH</div><div class="role">Creative Director</div></div></div>
    <div class="card"><img src="../assets/portraits/Zarlzazz.png" alt="Zarlzazz"><div class="meta"><div class="name">ZARLZAZZ</div><div class="role">Narrative Director</div></div></div>
    <div class="card"><img src="../assets/portraits/Vorga.png" alt="Vorga"><div class="meta"><div class="name">VORGA</div><div class="role">Encounter Director</div></div></div>
    <div class="card"><img src="../assets/portraits/Mizzik.png" alt="Mizzik"><div class="meta"><div class="name">MIZZIK</div><div class="role">Furniture &amp; Loot</div></div></div>
  </div>
</body>
</html>
