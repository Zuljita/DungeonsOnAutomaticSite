<!-- @dsCard group="Brand" viewport="700x230" name="Logo Lockups" subtitle="The brick-archway mark with gear cogs. Wordmark in Cinzel. On dark and parchment." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 0; display: grid; grid-template-columns: 1fr 1fr; font-family: var(--font-display); }
  .panel { padding: 26px 28px; display: flex; align-items: center; gap: 16px; }
  .dark { background: var(--surface-app); }
  .light { background: var(--parchment-100); }
  .mark { width: 64px; height: 64px; flex: none; }
  .wm { display: flex; flex-direction: column; line-height: 1; }
  .wm .t { font-weight: 800; font-size: 21px; letter-spacing: 0.04em; }
  .wm .s { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; margin-top: 6px; text-transform: uppercase; }
  .dark .t { color: var(--stone-50); } .dark .s { color: var(--brass-300); }
  .light .t { color: var(--ink-900); } .light .s { color: var(--ember-600); }
</style>
</head>
<body>
  <div class="panel dark">
    <img class="mark" src="../assets/brand/doa_logo_transparent.svg" alt="DOA mark">
    <div class="wm"><span class="t">DUNGEONS<br>ON&nbsp;AUTOMATIC</span><span class="s">Procedural Dungeons</span></div>
  </div>
  <div class="panel light">
    <img class="mark" src="../assets/brand/doa_logo_transparent.svg" alt="DOA mark">
    <div class="wm"><span class="t">DUNGEONS<br>ON&nbsp;AUTOMATIC</span><span class="s">Procedural Dungeons</span></div>
  </div>
</body>
</html>
