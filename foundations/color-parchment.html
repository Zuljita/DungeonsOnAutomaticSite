<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-panel); font-family: var(--font-mono); padding: 20px; }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-doc); }
  .chip { flex: 1; height: 100px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 9px; gap: 2px; }
  .n { font-size: 10.5px; font-weight: 600; }
  .h { font-size: 9.5px; opacity: 0.75; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="chip" style="background:var(--parchment-floor); color:#3d362b;"><span class="n">floor</span><span class="h">#fff7df</span></div>
    <div class="chip" style="background:var(--parchment-100); color:#3d362b;"><span class="n">parch&nbsp;100</span><span class="h">#f4e8ce</span></div>
    <div class="chip" style="background:var(--parchment-200); color:#3d362b;"><span class="n">wall&nbsp;200</span><span class="h">#eadbb7</span></div>
    <div class="chip" style="background:var(--parchment-400); color:#3d362b;"><span class="n">400</span><span class="h">#c8ad77</span></div>
    <div class="chip" style="background:var(--ink-700); color:#f4e8ce;"><span class="n">ink&nbsp;700</span><span class="h">#3d362b</span></div>
    <div class="chip" style="background:var(--ink-900); color:#f4e8ce;"><span class="n">ink&nbsp;900</span><span class="h">#1b1b1b</span></div>
  </div>
</body>
</html>
