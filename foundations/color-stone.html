<!-- @dsCard group="Colors" viewport="700x208" name="Stone — Workshop Neutrals" subtitle="Warm-tinted darks for the app chrome: forged iron under low torchlight." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-app); font-family: var(--font-mono); padding: 20px; }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); border: 1px solid var(--stone-700); }
  .chip { flex: 1; height: 104px; display: flex; flex-direction: column; justify-content: flex-end; padding: 7px 8px; gap: 2px; }
  .n { font-size: 10.5px; font-weight: 600; }
  .h { font-size: 9.5px; opacity: 0.8; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="chip" style="background:var(--stone-950); color:#b6b2c0;"><span class="n">950</span><span class="h">#100f12</span></div>
    <div class="chip" style="background:var(--stone-900); color:#b6b2c0;"><span class="n">900</span><span class="h">#16151a</span></div>
    <div class="chip" style="background:var(--stone-800); color:#b6b2c0;"><span class="n">800</span><span class="h">#232128</span></div>
    <div class="chip" style="background:var(--stone-700); color:#d8d5df;"><span class="n">700</span><span class="h">#2d2b34</span></div>
    <div class="chip" style="background:var(--stone-600); color:#d8d5df;"><span class="n">600</span><span class="h">#3a3742</span></div>
    <div class="chip" style="background:var(--stone-400); color:#16151a;"><span class="n">400</span><span class="h">#6a6675</span></div>
    <div class="chip" style="background:var(--stone-300); color:#16151a;"><span class="n">300</span><span class="h">#8e8a99</span></div>
    <div class="chip" style="background:var(--stone-100); color:#16151a;"><span class="n">100</span><span class="h">#d8d5df</span></div>
    <div class="chip" style="background:var(--stone-50); color:#16151a;"><span class="n">50</span><span class="h">#efedf3</span></div>
  </div>
</body>
</html>
