<!-- @dsCard group="Effects" viewport="700x200" name="Elevation" subtitle="Warm-black, low and heavy. Raised metal carries a faint top glint." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-sunken); padding: 26px 24px; font-family: var(--font-mono); }
  .row { display: flex; gap: 24px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 96px; height: 72px; background: var(--stone-700); border-radius: var(--radius-md); }
  .lbl { font-size: 10.5px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="lbl">xs</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm),var(--glint-top)"></div><span class="lbl">sm + glint</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md),var(--glint-top)"></div><span class="lbl">md</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="lbl">lg</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><span class="lbl">xl</span></div>
  </div>
</body>
</html>
