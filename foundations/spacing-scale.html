<!-- @dsCard group="Spacing" viewport="700x190" name="Spacing Scale" subtitle="4px base grid. Dense and tool-like — steps stay tight." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-panel); padding: 18px 24px; color: var(--text-body); font-family: var(--font-mono); }
  .r { display: flex; align-items: center; gap: 14px; height: 24px; }
  .tok { width: 150px; flex: none; font-size: 11.5px; color: var(--text-faint); }
  .bar { height: 13px; background: var(--brass-300); border-radius: 1px; }
</style>
</head>
<body>
  <div class="r"><span class="tok">--space-1 · 4px</span><div class="bar" style="width:4px"></div></div>
  <div class="r"><span class="tok">--space-2 · 8px</span><div class="bar" style="width:8px"></div></div>
  <div class="r"><span class="tok">--space-3 · 12px</span><div class="bar" style="width:12px"></div></div>
  <div class="r"><span class="tok">--space-4 · 16px</span><div class="bar" style="width:16px"></div></div>
  <div class="r"><span class="tok">--space-6 · 24px</span><div class="bar" style="width:24px"></div></div>
  <div class="r"><span class="tok">--space-8 · 32px</span><div class="bar" style="width:32px"></div></div>
  <div class="r"><span class="tok">--space-12 · 48px</span><div class="bar" style="width:48px"></div></div>
  <div class="r"><span class="tok">--space-16 · 64px</span><div class="bar" style="width:64px"></div></div>
</body>
</html>
