<!-- @dsCard group="Type" viewport="700x150" name="Eyebrow & Tracking" subtitle="Small-caps overlines for section labels. Wide tracking, brass or muted." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-panel); padding: 22px 24px; color: var(--text-strong); }
  .eyebrow { font-family: var(--font-display); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: var(--tracking-eyebrow); color: var(--brass-300); }
  .eyebrow.muted { color: var(--text-faint); }
  h2 { font-family: var(--font-display); font-weight: 700; font-size: 26px; letter-spacing: 0.04em; margin: 6px 0 18px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="eyebrow">Stage Manager</div>
  <h2>Encounter Director</h2>
  <div class="eyebrow muted">Source Books · 14 enabled</div>
  <div class="meta" style="margin-top:10px;">Cinzel 600 · UPPERCASE · tracking 0.22em</div>
</body>
</html>
